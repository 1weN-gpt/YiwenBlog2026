{% extends 'base.html' %}

{% block title %}验证验证码 - 逸文博客{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <div class="flex justify-center mb-4">
                <lottie-player 
                    src="https://assets5.lottiefiles.com/packages/lf20_qmfs6c3i.json"
                    background="transparent"
                    speed="1"
                    style="width: 180px; height: 180px;"
                    loop
                    autoplay>
                </lottie-player>
            </div>
            
            <h2 class="card-title text-2xl text-center justify-center mb-2">
                <i class="fas fa-shield-alt text-primary mr-2"></i>验证身份
            </h2>
            <p class="text-center text-gray-500 mb-6">请输入邮箱收到的6位验证码</p>
            
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} mb-4">
                    <i class="fas fa-info-circle"></i>
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            {% endif %}
            
            <form method="post" action="{% url 'blog:verify_code' %}">
                {% csrf_token %}
                
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="label-text">邮箱地址</span>
                    </label>
                    <input type="email" name="email" class="input input-bordered" placeholder="请输入注册邮箱" required />
                </div>
                
                <div class="form-control mb-6">
                    <label class="label">
                        <span class="label-text">验证码</span>
                        <span class="label-text-alt text-gray-500">10分钟内有效</span>
                    </label>
                    <input type="text" name="code" class="input input-bordered text-center text-2xl tracking-widest" placeholder="000000" maxlength="6" pattern="\d{6}" required />
                </div>
                
                <button type="submit" class="btn btn-primary w-full">
                    <i class="fas fa-check mr-2"></i>验证
                </button>
            </form>
            
            <div class="divider">或</div>
            
            <div class="text-center space-y-2">
                <p>没有收到？<a href="{% url 'blog:forgot_password' %}" class="link link-primary">重新发送</a></p>
                <p><a href="{% url 'blog:login' %}" class="link link-secondary text-sm">返回登录</a></p>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
{% endblock %}
