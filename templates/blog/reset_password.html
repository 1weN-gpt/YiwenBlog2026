{% extends 'base.html' %}

{% block title %}重置密码 - 逸文博客{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <div class="flex justify-center mb-4">
                <lottie-player 
                    src="https://assets5.lottiefiles.com/packages/lf20_3jmvq04g.json"
                    background="transparent"
                    speed="1"
                    style="width: 180px; height: 180px;"
                    loop
                    autoplay>
                </lottie-player>
            </div>
            
            <h2 class="card-title text-2xl text-center justify-center mb-2">
                <i class="fas fa-lock text-primary mr-2"></i>重置密码
            </h2>
            <p class="text-center text-gray-500 mb-6">请设置您的新密码</p>
            
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} mb-4">
                    <i class="fas fa-info-circle"></i>
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            {% endif %}
            
            <form method="post" action="{% url 'blog:reset_password' %}">
                {% csrf_token %}
                
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="label-text">新密码</span>
                    </label>
                    <div class="relative">
                        <input type="password" id="password" name="password" class="input input-bordered w-full pr-10" placeholder="请输入新密码（至少6位）" minlength="6" required />
                        <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" onclick="togglePassword('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-control mb-6">
                    <label class="label">
                        <span class="label-text">确认密码</span>
                    </label>
                    <div class="relative">
                        <input type="password" id="password_confirm" name="password_confirm" class="input input-bordered w-full pr-10" placeholder="请再次输入新密码" minlength="6" required />
                        <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" onclick="togglePassword('password_confirm', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-full">
                    <i class="fas fa-save mr-2"></i>确认重置
                </button>
            </form>
            
            <div class="divider">或</div>
            
            <div class="text-center">
                <p><a href="{% url 'blog:login' %}" class="link link-secondary text-sm">返回登录</a></p>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>
{% endblock %}
